<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Auto Refresh Start</title>
<style>body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb;color:#172033}header{padding:18px 20px;background:#172033;color:white}main{padding:18px}.panel{display:flex;flex-wrap:wrap;gap:12px;align-items:end;background:white;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:14px}label{display:grid;gap:6px;font-weight:700}input{padding:10px;border:1px solid #cfd8e3;border-radius:10px}button{border:0;border-radius:10px;padding:11px 14px;font-weight:800;cursor:pointer}.go{background:#20a46b;color:white}.stop{background:#d94242;color:white}iframe{width:100%;height:72vh;border:1px solid #cfd8e3;border-radius:14px;background:white}</style>
</head>
<body>
<header><h1>Auto Refresh Start</h1><p>This page starts refreshing automatically when opened.</p></header>
<main><section class="panel"><label>Page path <input id="p" value="/"></label><label>Seconds <input id="s" type="number" min="3" value="15"></label><button class="go" onclick="start()">Restart</button><button class="stop" onclick="stopIt()">Stop</button><span id="st">Starting...</span></section><iframe id="f" title="Site preview"></iframe></main>
<script>let t;const qs=new URLSearchParams(location.search),p=document.getElementById('p'),s=document.getElementById('s'),f=document.getElementById('f'),st=document.getElementById('st');p.value=qs.get('path')||localStorage.arPath||'/';s.value=qs.get('seconds')||localStorage.arSecs||'15';function target(){let x=p.value||'/';if(x.includes('auto-refresh'))x='/';const u=new URL(x,location.origin);u.searchParams.set('_r',Date.now());return u.href}function run(){f.src=target();st.textContent='Running. Last refresh: '+new Date().toLocaleTimeString()}function stopIt(){if(t)clearInterval(t);t=null;st.textContent='Stopped'}function start(){stopIt();localStorage.arPath=p.value||'/';localStorage.arSecs=s.value||'15';run();t=setInterval(run,Math.max(3,Number(s.value)||15)*1000)}start();</script>
</body>
</html>
